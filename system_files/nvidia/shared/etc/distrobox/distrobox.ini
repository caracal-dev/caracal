# Distrobox defaults for the Caracal NVIDIA image.
# Existing distroboxes can be refreshed with:
# distrobox assemble create --replace --file /etc/distrobox/distrobox.ini

[arch]
image=ghcr.io/ublue-os/arch-toolbox:latest
nvidia=true
pull=true

[debian]
image=quay.io/toolbx-images/debian-toolbox:unstable
nvidia=true
pull=true

[fedora]
image=ghcr.io/ublue-os/fedora-toolbox:latest
nvidia=true
pull=true

[opensuse]
image=quay.io/toolbx-images/opensuse-toolbox:tumbleweed
nvidia=true
pull=true

[ubuntu]
image=ghcr.io/ublue-os/ubuntu-toolbox:latest
nvidia=true
pull=true

[wolfi]
image=ghcr.io/ublue-os/wolfi-toolbox
nvidia=true
pull=true
