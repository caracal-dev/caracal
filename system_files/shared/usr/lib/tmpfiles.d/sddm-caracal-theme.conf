# Create the Caracal SDDM theme override directory in the sddm system user's
# XDG data home. Do not pre-seed theme.conf.user there: the packaged theme.conf
# already carries Caracal defaults, while a stale per-user override can pin the
# greeter background to the old Fedora/KDE wallpaper across upgrades.

d /var/lib/sddm/.local                                         0755 sddm sddm -
d /var/lib/sddm/.local/share                                   0755 sddm sddm -
d /var/lib/sddm/.local/share/sddm                              0755 sddm sddm -
d /var/lib/sddm/.local/share/sddm/themes                       0755 sddm sddm -
d /var/lib/sddm/.local/share/sddm/themes/caracal               0755 sddm sddm -
