# Deploy the Caracal SDDM theme user-override to the sddm system user's XDG
# data home. SDDM reads theme.conf.user from that location at runtime, not
# from /usr/share/sddm/themes/. Using C (copy-if-absent) preserves any
# wallpaper the user may have set via System Settings → Login Screen.

d /var/lib/sddm/.local                                         0755 sddm sddm -
d /var/lib/sddm/.local/share                                   0755 sddm sddm -
d /var/lib/sddm/.local/share/sddm                              0755 sddm sddm -
d /var/lib/sddm/.local/share/sddm/themes                       0755 sddm sddm -
d /var/lib/sddm/.local/share/sddm/themes/caracal               0755 sddm sddm -
C /var/lib/sddm/.local/share/sddm/themes/caracal/theme.conf.user 0644 sddm sddm - /usr/share/sddm/themes/caracal/theme.conf.user
