
# MIDI controller kernel module quirks for Caracal OS.
#
# The Samson Carbon 49 alias is adapted from Zynthian's
# zynthian-sys/etc/modprobe.d/carbon49-alias.conf.
# Credit: Zynthian Project, https://zynthian.org/

# Ensure the Samson Carbon 49 loads snd-usb-audio instead of usbtouchscreen.
# This MIDI controller reports the non-unique USB vendor/product ID 1234:5678.
alias usb:v1234p5678d*dc*dsc*dp*ic*isc*ip*in* snd-usb-audio
